name: Weather Agent

on:
  schedule:
    - cron: '0 7,12,17,22 * * *'
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Install dependencies
        run: pip install -r requirements.txt
    
      - name: Run weather script
        run: python weather.py

